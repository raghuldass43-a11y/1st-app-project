<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HostelSwap — Move-in/Move-out Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --paper: #ede4d3;
    --paper-deep: #e2d6bf;
    --card: #f7f2e7;
    --ink: #3a2e23;
    --ink-soft: #6b5c4d;
    --tape: #c96a3e;
    --tape-dark: #ad5731;
    --green: #5c7a5e;
    --green-dark: #43593f;
    --red: #b0463c;
    --blue: #4a6a8a;
    --line: #d8c9ac;
    --shadow: rgba(58,46,35,0.18);
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(58,46,35,0.05) 1px, transparent 0);
    background-size: 18px 18px;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }
  ::selection{ background: var(--tape); color: white; }
  button{ font-family: inherit; cursor: pointer; }
  input, textarea, select{ font-family: inherit; }
  a{ color: inherit; }

  .display{ font-family: 'Kalam', cursive; }
  .mono{ font-family: 'IBM Plex Mono', monospace; }

  /* ---------- App shell ---------- */
  #root{ max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--paper); position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.15); }

  .topbar{
    position: sticky; top:0; z-index: 40;
    background: var(--paper);
    border-bottom: 2px solid var(--ink);
    padding: 14px 16px 10px;
  }
  .brand-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 10px; }
  .brand{
    font-family:'Kalam',cursive; font-weight:700; font-size: 24px; color: var(--ink);
    display:flex; align-items:center; gap:8px;
  }
  .brand .crate{
    width: 26px; height:22px; background: var(--tape); border-radius: 3px; position:relative;
    box-shadow: inset 0 0 0 2px var(--ink);
  }
  .brand .crate::after{
    content:""; position:absolute; inset: 4px; border-top: 2px solid var(--ink); border-bottom: none;
  }
  .icon-btn{
    width:36px; height:36px; border-radius:50%; border:2px solid var(--ink); background: var(--card);
    display:flex; align-items:center; justify-content:center; font-size:16px; position:relative;
  }
  .icon-btn .badge{
    position:absolute; top:-4px; right:-4px; background: var(--tape); color:white; font-size:10px;
    width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-weight:700; border: 1.5px solid var(--paper);
  }
  .search-wrap{ position:relative; }
  .search-input{
    width:100%; padding: 10px 14px 10px 38px; border-radius: 10px; border: 2px solid var(--ink);
    background: var(--card); font-size: 14px; color: var(--ink); outline: none;
  }
  .search-input:focus{ border-color: var(--tape); }
  .search-icon{ position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:0.6; font-size:14px; }

  .chips-row{
    display:flex; gap:8px; overflow-x:auto; padding: 12px 16px 4px; scrollbar-width:none;
  }
  .chips-row::-webkit-scrollbar{ display:none; }
  .chip{
    flex-shrink:0; padding: 7px 13px; border-radius: 20px; border: 2px solid var(--ink);
    background: var(--card); font-size: 13px; font-weight:600; white-space:nowrap;
    display:flex; align-items:center; gap:6px; transition: transform 0.08s ease;
  }
  .chip.active{ background: var(--ink); color: var(--paper); }
  .chip:active{ transform: scale(0.95); }

  .content{ padding: 8px 16px 100px; }

  .section-label{
    font-family:'Kalam',cursive; font-weight:700; font-size:18px; margin: 18px 0 10px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .section-label .tag{
    font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; color: var(--ink-soft);
    background: var(--card); border:1px solid var(--line); padding:2px 8px; border-radius: 4px;
  }

  /* ---------- Listing card (index-card / taped look) ---------- */
  .grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card{
    background: var(--card);
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    position: relative;
    box-shadow: 3px 4px 0 var(--shadow);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    overflow: hidden;
  }
  .card:active{ transform: translate(1px,2px); box-shadow: 1px 2px 0 var(--shadow); }
  .tape-corner{
    position:absolute; top:-6px; left:50%; transform: translateX(-50%) rotate(-3deg);
    width: 54px; height: 20px; background: rgba(255,244,214,0.75);
    border: 1px solid rgba(58,46,35,0.25);
    z-index: 3;
  }
  .card-img{
    width:100%; aspect-ratio: 1/1; object-fit: cover; display:block; background: var(--paper-deep);
    border-bottom: 1.5px solid var(--ink);
  }
  .status-flag{
    position:absolute; top:8px; right:8px; z-index:3;
    font-family:'IBM Plex Mono',monospace; font-size:9.5px; font-weight:700; text-transform:uppercase;
    padding: 3px 7px; border-radius: 3px; letter-spacing:0.03em;
    color:white;
  }
  .status-Available{ background: var(--green); }
  .status-Reserved{ background: var(--blue); }
  .status-Sold{ background: var(--red); }
  .status-Free{ background: var(--tape); }
  .card-body{ padding: 8px 10px 10px; }
  .card-title{ font-weight:700; font-size: 13.5px; line-height:1.25; margin-bottom:3px; }
  .card-meta{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color: var(--ink-soft); }
  .card-price{ font-family:'Kalam',cursive; font-weight:700; font-size:17px; color: var(--tape-dark); margin-top:4px; }
  .card-price.free{ color: var(--green-dark); }
  .fav-btn{
    position:absolute; bottom:8px; right:8px; z-index:3;
    width:26px; height:26px; border-radius:50%; border:1.5px solid var(--ink); background: var(--card);
    display:flex; align-items:center; justify-content:center; font-size:13px;
  }

  /* ---------- Bottom nav ---------- */
  .bottomnav{
    position: fixed; bottom:0; left:50%; transform: translateX(-50%);
    width:100%; max-width:480px; background: var(--card); border-top: 2px solid var(--ink);
    display:flex; justify-content:space-around; padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
    z-index: 50;
  }
  .navbtn{
    background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:2px;
    font-size: 10px; font-weight:600; color: var(--ink-soft); padding: 4px 8px; border-radius:8px;
  }
  .navbtn.active{ color: var(--ink); }
  .navbtn .navicon{ font-size:19px; }
  .navbtn.active .navicon{ transform: translateY(-2px); }

  .fab{
    position: fixed; bottom: 76px; left:50%; transform: translateX(calc(-50% + 190px));
    width: 56px; height:56px; border-radius:50%; background: var(--tape); border: 2.5px solid var(--ink);
    color:white; font-size: 26px; display:flex; align-items:center; justify-content:center;
    box-shadow: 3px 4px 0 var(--shadow); z-index: 55;
  }
  .fab:active{ transform: translateX(calc(-50% + 190px)) translate(1px,2px); box-shadow:1px 2px 0 var(--shadow); }

  /* ---------- Generic screen bits ---------- */
  .screen-title{ font-family:'Kalam',cursive; font-weight:700; font-size:26px; margin: 6px 0 2px; }
  .screen-sub{ color: var(--ink-soft); font-size: 13px; margin-bottom: 14px; }

  .field{ margin-bottom: 14px; }
  .field label{ display:block; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; color: var(--ink-soft); margin-bottom:5px; }
  .field input, .field textarea, .field select{
    width:100%; padding: 10px 12px; border-radius: 8px; border: 2px solid var(--ink); background: var(--card);
    font-size: 14px; color: var(--ink); outline:none;
  }
  .field textarea{ resize: vertical; min-height: 70px; }
  .field input:focus, .field textarea:focus, .field select:focus{ border-color: var(--tape); }
  .field-row{ display:flex; gap:10px; }
  .field-row .field{ flex:1; }

  .btn{
    padding: 11px 18px; border-radius: 9px; border: 2px solid var(--ink); font-weight:700; font-size:14px;
    background: var(--ink); color: var(--paper); width:100%; text-align:center;
  }
  .btn:active{ transform: translateY(1px); }
  .btn.secondary{ background: var(--card); color: var(--ink); }
  .btn.tape{ background: var(--tape); color:white; border-color: var(--tape-dark); }
  .btn.danger{ background: var(--red); color:white; border-color: #7c2f28; }
  .btn.block{ display:block; }
  .btn.small{ padding: 7px 12px; font-size:12.5px; width:auto; }

  .pill-select{ display:flex; gap:8px; flex-wrap:wrap; }
  .pill-opt{
    padding: 8px 14px; border-radius: 20px; border: 2px solid var(--ink); background: var(--card);
    font-size: 13px; font-weight:600;
  }
  .pill-opt.active{ background: var(--ink); color: var(--paper); }

  .upload-box{
    border: 2px dashed var(--ink); border-radius: 10px; padding: 22px 10px; text-align:center;
    color: var(--ink-soft); font-size: 13px; background: var(--card); margin-bottom: 8px;
  }
  .thumb-row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 10px; }
  .thumb{
    width:56px; height:56px; border-radius:6px; border:1.5px solid var(--ink); object-fit:cover;
    background: var(--paper-deep);
  }

  /* header w/ back */
  .subhead{
    display:flex; align-items:center; gap:10px; padding: 14px 16px 6px; position:sticky; top:0;
    background: var(--paper); z-index: 30; border-bottom: 2px solid var(--ink);
  }
  .backbtn{
    width:34px; height:34px; border-radius:50%; border:2px solid var(--ink); background: var(--card);
    display:flex; align-items:center; justify-content:center; font-size:16px;
  }
  .subhead-title{ font-family:'Kalam',cursive; font-weight:700; font-size:19px; }

  /* Detail screen */
  .detail-hero{ width:100%; aspect-ratio: 1/1; object-fit:cover; background: var(--paper-deep); border-bottom: 2px solid var(--ink); }
  .detail-body{ padding: 16px; }
  .seller-row{
    display:flex; align-items:center; gap:10px; padding: 10px; background: var(--card);
    border: 1.5px solid var(--ink); border-radius: 10px; margin: 12px 0;
  }
  .avatar{
    width: 38px; height:38px; border-radius:50%; background: var(--tape); color:white; font-weight:700;
    display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0;
    font-family:'Kalam',cursive;
  }
  .stars{ color: var(--tape-dark); font-size:12px; }
  .detail-actions{ display:flex; gap:10px; margin-top: 14px; }

  .swap-banner{
    background: rgba(92,122,94,0.12); border: 1.5px dashed var(--green-dark); border-radius:8px;
    padding: 8px 10px; font-size:12.5px; color: var(--green-dark); font-weight:600; margin-top:10px;
  }

  /* Chat */
  .chat-list-item{
    display:flex; gap:10px; padding: 12px 4px; border-bottom: 1px solid var(--line); align-items:center;
  }
  .chat-preview{ flex:1; min-width:0; }
  .chat-preview .name{ font-weight:700; font-size:13.5px; }
  .chat-preview .msg{ font-size:12px; color: var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chat-time{ font-size:10.5px; color: var(--ink-soft); font-family:'IBM Plex Mono',monospace; }

  .chat-thread{ display:flex; flex-direction:column; gap:8px; padding: 14px 16px 90px; }
  .bubble{
    max-width: 75%; padding: 9px 12px; border-radius: 12px; font-size: 13.5px; line-height:1.4;
    border: 1.5px solid var(--ink);
  }
  .bubble.me{ align-self:flex-end; background: var(--tape); color:white; border-color: var(--tape-dark); border-bottom-right-radius:3px; }
  .bubble.them{ align-self:flex-start; background: var(--card); border-bottom-left-radius:3px; }
  .bubble.system{
    align-self:center; background:none; border: 1.5px dashed var(--ink-soft); color: var(--ink-soft);
    font-size:11.5px; font-family:'IBM Plex Mono',monospace;
  }
  .chat-input-row{
    position: fixed; bottom:0; left:50%; transform: translateX(-50%); width:100%; max-width:480px;
    display:flex; gap:8px; padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    background: var(--paper); border-top: 2px solid var(--ink); z-index: 50;
  }
  .chat-input-row input{
    flex:1; padding: 10px 14px; border-radius: 20px; border: 2px solid var(--ink); background:var(--card); outline:none; font-size:13.5px;
  }
  .sendbtn{
    width:40px; height:40px; border-radius:50%; background: var(--ink); color: var(--paper); border:none;
    display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;
  }

  /* toast */
  .toast{
    position: fixed; bottom: 96px; left:50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper); padding: 10px 18px; border-radius: 24px;
    font-size: 13px; font-weight:600; z-index: 100; box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    display:flex; align-items:center; gap:8px; max-width: 90%;
  }

  /* modal */
  .modal-overlay{
    position: fixed; inset:0; background: rgba(58,46,35,0.55); z-index: 90;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .modal-sheet{
    width:100%; max-width:480px; background: var(--paper); border-radius: 18px 18px 0 0;
    border: 2px solid var(--ink); border-bottom:none; padding: 18px 18px 28px; max-height: 85vh; overflow-y:auto;
  }
  .modal-handle{ width:40px; height:4px; background: var(--ink-soft); border-radius:2px; margin: 0 auto 14px; opacity:0.4; }

  .empty-state{ text-align:center; padding: 50px 20px; color: var(--ink-soft); }
  .empty-state .em{ font-size:38px; margin-bottom:10px; }

  .toggle-row{ display:flex; align-items:center; justify-content:space-between; padding: 12px 0; border-bottom:1px solid var(--line); }
  .switch{ width:42px; height:24px; border-radius:14px; border:2px solid var(--ink); background: var(--card); position:relative; }
  .switch.on{ background: var(--green); }
  .switch .knob{
    width:16px; height:16px; border-radius:50%; background: var(--ink); position:absolute; top:2px; left:2px;
    transition: left 0.15s ease;
  }
  .switch.on .knob{ left: 20px; background: white; }

  .admin-row{
    display:flex; align-items:center; gap:10px; padding: 10px; background: var(--card);
    border:1.5px solid var(--ink); border-radius:8px; margin-bottom:8px;
  }
  .admin-row img{ width:44px; height:44px; border-radius:6px; object-fit:cover; flex-shrink:0; }
  .admin-row .info{ flex:1; min-width:0; }
  .admin-row .info .t{ font-weight:700; font-size:13px; }
  .admin-row .info .s{ font-size:11px; color: var(--ink-soft); }

  .rating-stars{ display:flex; gap:4px; font-size:26px; justify-content:center; margin: 14px 0; }
  .star{ opacity:0.3; }
  .star.filled{ opacity:1; }

  .role-toggle{ display:flex; gap:8px; margin-bottom:18px; }
  .role-toggle .pill-opt{ flex:1; text-align:center; }

  ::-webkit-scrollbar{ width:0; height:0; }
</style>
</head>

const REPORT_REASONS = ["Spam or scam", "Fake or misleading listing", "Inappropriate content", "Already sold elsewhere", "Other"];

function timeAgo(ts){
  const mins = Math.floor((Date.now()-ts)/60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins/60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs/24)}d ago`;
}
function userById(id){ return id === "me" ? ME : USERS.find(u=>u.id===id); }
function fmtPrice(l){
  if (l.status === "Free" || l.price === 0) return "FREE";
  return `₹${l.price.toLocaleString('en-IN')}`;
}

function SellScreen({ onPublish, onBack }){
  const [images, setImages] = useState([]);
  const [title, setTitle] = useState("");
  const [desc, setDesc] = useState("");
  const [price, setPrice] = useState("");
  const [category, setCategory] = useState(CATEGORIES[0].key);
  const [condition, setCondition] = useState(CONDITIONS[1]);
  const [hostel, setHostel] = useState(ME.hostel);
  const [room, setRoom] = useState(ME.room);
  const [contact, setContact] = useState("chat");
  const [isFree, setIsFree] = useState(false);
  const [isSwap, setIsSwap] = useState(false);
  const [suggested, setSuggested] = useState(null);

  const addFakeImage = () => {
    setImages([...images, IMG("new"+Math.floor(Math.random()*9999))]);
  };

  const suggestPrice = () => {
    const similar = LISTINGS.filter(l=>l.category===category && l.price>0);
    if (similar.length === 0) { setSuggested(null); return; }
    const avg = Math.round(similar.reduce((s,l)=>s+l.price,0)/similar.length);
    setSuggested(avg);
  };

  const generateDesc = () => {
    const cat = CAT_MAP[category];
    setDesc(`${cat.label} in ${condition.toLowerCase()} condition. Perfect for a hostel room, pickup available from ${hostel}${room?`, room ${room}`:""}. Message for more photos or details.`);
  };

  const canPublish = title.trim() && images.length>0 && (isFree || isSwap || price !== "");

  return (
    <div>
      <Header title="Sell an item" onBack={onBack} />
      <div className="content" style={{paddingTop:14}}>
        <div className="field">
          <label>Photos</label>
          <div className="thumb-row">
            {images.map((im,i)=><img key={i} className="thumb" src={im} />)}
          </div>
          <div className="upload-box" onClick={addFakeImage} style={{cursor:'pointer'}}>
            📸 Tap to add a photo ({images.length} added)
          </div>
          {images.length>0 && (
            <button className="btn small secondary" onClick={generateDesc}>✨ AI-suggest description from photos</button>
          )}
        </div>

        <div className="field">
          <label>Title</label>
          <input placeholder="e.g. Study Table, barely used" value={title} onChange={e=>setTitle(e.target.value)} />
        </div>

        <div className="field">
          <label>Description</label>
          <textarea placeholder="Condition, pickup details, anything a buyer should know…" value={desc} onChange={e=>setDesc(e.target.value)} />
        </div>

        <div className="field">
          <label>Category</label>
          <div className="pill-select">
            {CATEGORIES.map(c=>(
              <button key={c.key} className={`pill-opt ${category===c.key?'active':''}`} onClick={()=>setCategory(c.key)}>{c.icon} {c.label}</button>
            ))}
          </div>
        </div>

        <div className="field">
          <label>Condition</label>
          <div className="pill-select">
            {CONDITIONS.map(c=>(
              <button key={c} className={`pill-opt ${condition===c?'active':''}`} onClick={()=>setCondition(c)}>{c}</button>
            ))}
          </div>
        </div>

        <div className="toggle-row">
          <div>
            <div style={{fontWeight:600, fontSize:13.5}}>List as free donation</div>
            <div style={{fontSize:11.5, color:'var(--ink-soft)'}}>Shows up in the Free Items section</div>
          </div>
          <div className={`switch ${isFree?'on':''}`} onClick={()=>{setIsFree(!isFree); if(!isFree) setIsSwap(false);}}><div className="knob"></div></div>
        </div>
        <div className="toggle-row">
          <div>
            <div style={{fontWeight:600, fontSize:13.5}}>Open to swapping</div>
            <div style={{fontSize:11.5, color:'var(--ink-soft)'}}>Trade instead of selling for cash</div>
          </div>
          <div className={`switch ${isSwap?'on':''}`} onClick={()=>{setIsSwap(!isSwap); if(!isSwap) setIsFree(false);}}><div className="knob"></div></div>
        </div>

        {!isFree && (
          <div className="field" style={{marginTop:14}}>
            <label>Price (₹)</label>
            <input type="number" placeholder="0" value={price} onChange={e=>setPrice(e.target.value)} disabled={isSwap} />
            <button className="btn small secondary" style={{marginTop:8}} onClick={suggestPrice}>💡 Suggest a price</button>
            {suggested !== null && (
              <div className="card-meta" style={{marginTop:6}}>
                Similar {CAT_MAP[category].label.toLowerCase()} items average <b>₹{suggested}</b>.
                {" "}<a onClick={()=>setPrice(String(suggested))} style={{color:'var(--tape-dark)', fontWeight:700, cursor:'pointer'}}>Use this</a>
              </div>
            )}
          </div>
        )}

        <div className="field-row">
          <div className="field">
            <label>Hostel</label>
            <select value={hostel} onChange={e=>setHostel(e.target.value)}>
              {HOSTELS.map(h=><option key={h} value={h}>{h}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Room (optional)</label>
            <input value={room} onChange={e=>setRoom(e.target.value)} placeholder="e.g. 214" />
          </div>
        </div>

        <div className="field">
          <label>Preferred contact method</label>
          <div className="pill-select">
            {[["chat","In-app chat"], ["email","College email"]].map(([k,label])=>(
              <button key={k} className={`pill-opt ${contact===k?'active':''}`} onClick={()=>setContact(k)}>{label}</button>
            ))}
          </div>
        </div>

        <button className="btn tape block" disabled={!canPublish} style={{opacity: canPublish?1:0.5, marginTop:10}}
          onClick={()=>onPublish({ title, desc: desc || `${CAT_MAP[category].label}, ${condition.toLowerCase()} condition.`, price: isFree||isSwap?0:Number(price), category, condition, hostel, room, images, swap: isSwap, status: isFree?"Free":"Available" })}>
          {canPublish ? "Publish listing" : "Add a title and photo to continue"}
        </button>
      </div>
    </div>
  );
}

        <div className="section-label">📦 Your listings <span className="tag">{myListings.length}</span></div>
        {myListings.length === 0 ? (
          <div className="empty-state" style={{padding:'24px 20px'}}><div className="em">📭</div>You haven't listed anything yet.</div>
        ) : (
          <div className="grid">
            {myListings.map(l=><ListingCard key={l.id} listing={l} isFav={false} onOpen={onOpen} onToggleFav={()=>{}} />)}
          </div>
        )}

        <div className="section-label" style={{marginTop:22}}>⚙️ Settings</div>
        <div className="toggle-row">
          <div style={{fontWeight:600, fontSize:13.5}}>🌙 Dark mode</div>
          <div className={`switch ${darkMode?'on':''}`} onClick={()=>setDarkMode(!darkMode)}><div className="knob"></div></div>
        </div>
        <div className="toggle-row">
          <div style={{fontWeight:600, fontSize:13.5}}>🔔 Push notifications for matching items</div>
          <div className="switch on"><div className="knob"></div></div>
        </div>
        <div className="toggle-row" style={{border:'none'}}>
          <div style={{fontWeight:600, fontSize:13.5}}>🌐 Language</div>
          <select value={lang} onChange={e=>setLang(e.target.value)} style={{padding:'6px 10px', border:'2px solid var(--ink)', borderRadius:8, background:'var(--card)'}}>
            <option>English</option>
            <option>हिन्दी</option>
            <option>தமிழ்</option>
            <option>Español</option>
          </select>
        </div>

        <button className="btn secondary block" style={{marginTop:20}} onClick={onGoAdmin}>🛡️ Open admin dashboard (demo)</button>
      </div>
    </div>
  );
}

function AdminScreen({ listings, reports, onBack, onRemove, onVerify, onBanUser, onResolveReport }){
  const [tab, setTab] = useState("reports");
  return (
    <div>
      <Header title="Admin dashboard" onBack={onBack} />
      <div className="chips-row">
        {["reports","listings","users"].map(t=>(
          <button key={t} className={`chip ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
            {t==='reports'?'🚩 Reports':t==='listings'?'📦 Listings':'👤 Users'}
          </button>
        ))}
      </div>
      <div className="content" style={{paddingTop:8}}>
        {tab==='reports' && (
          reports.length===0 ? <div className="empty-state"><div className="em">✅</div>No open reports. All clear.</div> :
          reports.map((r,i)=>{
            const listing = LISTINGS.find(l=>l.id===r.listingId);
            if (!listing) return null;
            return (
              <div key={i} className="admin-row">
                <img src={listing.images[0]} />
                <div className="info">
                  <div className="t">{listing.title}</div>
                  <div className="s">🚩 {r.reason}{r.note ? ` — "${r.note}"` : ""}</div>
                </div>
                <div style={{display:'flex', flexDirection:'column', gap:4}}>
                  <button className="btn small danger" onClick={()=>onRemove(listing.id, i)}>Remove</button>
                  <button className="btn small secondary" onClick={()=>onResolveReport(i)}>Dismiss</button>
                </div>
              </div>
            );
          })
        )}
        {tab==='listings' && listings.map(l=>(
          <div key={l.id} className="admin-row">
            <img src={l.images[0]} />
            <div className="info">
              <div className="t">{l.title}</div>
              <div className="s">{userById(l.sellerId).name} · {l.status} · {l.hostel}</div>
            </div>
            <button className="btn small secondary" onClick={()=>onVerify(l.id)}>✓ Verify</button>
          </div>
        ))}
        {tab==='users' && USERS.map(u=>(
          <div key={u.id} className="admin-row">
            <div className="avatar" style={{flexShrink:0}}>{u.avatar}</div>
            <div className="info">
              <div className="t">{u.name}</div>
              <div className="s">{u.hostel} · Room {u.room} · ★{u.rating}</div>
            </div>
            <button className="btn small danger" onClick={()=>onBanUser(u.id)}>Ban</button>
          </div>
        ))}
      </div>
    </div>
  );
}

function AuthScreen({ onLogin }){
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  return (
    <div style={{padding:'60px 24px 24px', minHeight:'100vh', display:'flex', flexDirection:'column', justifyContent:'center'}}>
      <div style={{textAlign:'center', marginBottom:36}}>
        <div style={{fontSize:48, marginBottom:8}}>📦</div>
        <div className="brand" style={{justifyContent:'center', fontSize:30}}>HostelSwap</div>
        <div className="screen-sub" style={{marginTop:6}}>Buy, sell, swap, or donate hostel essentials — from students, for students.</div>
      </div>

      <div className="role-toggle">
        <button className={`pill-opt ${mode==='login'?'active':''}`} onClick={()=>setMode('login')}>Log in</button>
        <button className={`pill-opt ${mode==='register'?'active':''}`} onClick={()=>setMode('register')}>Register</button>
      </div>

      <div className="field">
        <label>College email</label>
        <input placeholder="yourname@college.edu" value={email} onChange={e=>setEmail(e.target.value)} />
      </div>
      {mode==='register' && (
        <div className="field">
          <label>Hostel block</label>
          <select defaultValue={HOSTELS[0]}>{HOSTELS.map(h=><option key={h}>{h}</option>)}</select>
        </div>
      )}
      <button className="btn tape block" style={{marginTop:8}} onClick={onLogin}>
        {mode==='login' ? 'Log in' : 'Verify college email & continue'}
      </button>
      <div style={{textAlign:'center', margin:'16px 0', color:'var(--ink-soft)', fontSize:12}}>— or —</div>
      <button className="btn secondary block" onClick={onLogin}>Continue with Google</button>
      <div className="card-meta" style={{textAlign:'center', marginTop:18}}>
        🪪 We verify every student with a college email or ID QR code, so listings stay real.
      </div>
    </div>
  );
}

/* ---------------- root app ---------------- */
function App(){
  const [authed, setAuthed] = useState(false);
  const [tab, setTab] = useState("home");
  const [listings, setListings] = useState(LISTINGS);
  const [favs, setFavs] = useState(["l2","l5"]);
  const [activeCat, setActiveCat] = useState("all");
  const [query, setQuery] = useState("");
  const [filters, setFilters] = useState({hostel:"",condition:"",min:"",max:"",status:""});
  const [showFilters, setShowFilters] = useState(false);
  const [openListing, setOpenListing] = useState(null);
  const [toast, setToast] = useState(null);
  const [chatThreads, setChatThreads] = useState(
    Object.entries(SEED_MESSAGES).map(([userId, messages])=>({userId, messages}))
  );
  const [openThread, setOpenThread] = useState(null);
  const [reportTarget, setReportTarget] = useState(null);
  const [reports, setReports] = useState([]);
  const [darkMode, setDarkMode] = useState(false);
  const [lang, setLang] = useState("English");
  const [adminMode, setAdminMode] = useState(false);
  const [rateTarget, setRateTarget] = useState(null);

  useEffect(()=>{
    document.body.style.filter = darkMode ? "invert(1) hue-rotate(180deg)" : "none";
  }, [darkMode]);

  const showToast = (text) => setToast(text);

  const toggleFav = (id) => {
    setFavs(f => f.includes(id) ? f.filter(x=>x!==id) : [...f, id]);
  };

  const filteredForFilters = useMemo(()=>{
    return listings.filter(l=>{
      if (filters.hostel && l.hostel !== filters.hostel) return false;
      if (filters.condition && l.condition !== filters.condition) return false;
      if (filters.status && l.status !== filters.status) return false;
      if (filters.min && l.price < Number(filters.min)) return false;
      if (filters.max && l.price > Number(filters.max)) return false;
      return true;
    });
  }, [listings, filters]);

  const publishListing = (data) => {
    const newListing = {
      id: "l" + (Date.now()),
      sellerId: "me",
      ...data,
      createdAt: Date.now(),
    };
    setListings([newListing, ...listings]);
    setTab("home");
    showToast("Listing published!");
  };

  const markSold = (id) => {
    setListings(listings.map(l => l.id===id ? {...l, status:"Sold"} : l));
    showToast("Marked as sold");
    setOpenListing(null);
  };

  const sendMessage = (userId, text, isSystem) => {
    setChatThreads(prev => {
      const exists = prev.find(t=>t.userId===userId);
      const newMsg = { from: "me", text, t: Date.now(), system: !!isSystem };
      if (exists){
        return prev.map(t=> t.userId===userId ? {...t, messages:[...t.messages, newMsg]} : t);
      }
      return [...prev, { userId, messages:[newMsg] }];
    });
    // simulate a reply from a seed conversation partner
    if (!isSystem){
      setTimeout(()=>{
        setChatThreads(prev => prev.map(t => t.userId===userId
          ? {...t, messages:[...t.messages, { from: userId, text: "Sounds good, let me check and get back to you!", t: Date.now() }]}
          : t));
      }, 1400);
    }
    setTab("chat");
    setOpenThread(userId);
    setOpenListing(null);
  };

  const submitReport = (listing, reason, note) => {
    setReports([...reports, { listingId: listing.id, reason, note }]);
    setReportTarget(null);
    showToast("Report submitted to admins");
  };

  const removeListing = (id, reportIdx) => {
    setListings(listings.filter(l=>l.id!==id));
    setReports(reports.filter((_,i)=>i!==reportIdx));
    showToast("Listing removed");
  };
  const resolveReport = (idx) => setReports(reports.filter((_,i)=>i!==idx));
  const verifyListing = (id) => showToast("Listing verified ✓");
  const banUser = (id) => showToast(`${userById(id).name} has been banned`);

  const myListings = listings.filter(l=>l.sellerId==="me");

  if (!authed){
    return <AuthScreen onLogin={()=>{ setAuthed(true); showToast("Welcome back!"); }} />;
  }

  if (adminMode){
    return <AdminScreen listings={listings} reports={reports} onBack={()=>setAdminMode(false)}
      onRemove={removeListing} onVerify={verifyListing} onBanUser={banUser} onResolveReport={resolveReport} />;
  }

  if (openThread){
    const thread = chatThreads.find(t=>t.userId===openThread) || {messages:[]};
    return (
      <>
        <ChatThreadScreen userId={openThread} messages={thread.messages}
          onBack={()=>setOpenThread(null)} onSend={sendMessage} />
        {toast && <Toast text={toast} onDone={()=>setToast(null)} />}
      </>
    );
  }

  if (openListing){
    return (
      <>
        <DetailScreen listing={openListing} favs={favs} onToggleFav={toggleFav}
          onBack={()=>setOpenListing(null)} onMessage={sendMessage} onMarkSold={markSold}
          onReport={setReportTarget} isMine={openListing.sellerId==="me"} />
        {reportTarget && <ReportModal listing={reportTarget} onClose={()=>setReportTarget(null)} onSubmit={submitReport} />}
        {toast && <Toast text={toast} onDone={()=>setToast(null)} />}
      </>
    );
  }

  return (
    <>
      {tab==="home" && (
        <HomeScreen listings={filteredForFilters} favs={favs} onOpen={setOpenListing} onToggleFav={toggleFav}
          activeCat={activeCat} setActiveCat={setActiveCat} query={query} setQuery={setQuery}
          onOpenFilters={()=>setShowFilters(true)} />
      )}
      {tab==="wishlist" && <WishlistScreen listings={listings} favs={favs} onOpen={setOpenListing} onToggleFav={toggleFav} />}
      {tab==="sell" && <SellScreen onPublish={publishListing} onBack={()=>setTab("home")} />}
      {tab==="chat" && <ChatListScreen threads={chatThreads} onOpenThread={setOpenThread} />}
      {tab==="profile" && (
        <ProfileScreen myListings={myListings} onOpen={setOpenListing} darkMode={darkMode} setDarkMode={setDarkMode}
          lang={lang} setLang={setLang} onGoAdmin={()=>setAdminMode(true)} onRatePrompt={setRateTarget} />
      )}

      <button className="fab" onClick={()=>setTab("sell")}>+</button>

      <div className="bottomnav">
        <button className={`navbtn ${tab==='home'?'active':''}`} onClick={()=>setTab('home')}><span className="navicon">🏠</span>Home</button>
        <button className={`navbtn ${tab==='wishlist'?'active':''}`} onClick={()=>setTab('wishlist')}><span className="navicon">❤️</span>Wishlist</button>
        <button className={`navbtn ${tab==='sell'?'active':''}`} onClick={()=>setTab('sell')}><span className="navicon">📸</span>Sell</button>
        <button className={`navbtn ${tab==='chat'?'active':''}`} onClick={()=>setTab('chat')}><span className="navicon">💬</span>Chat</button>
        <button className={`navbtn ${tab==='profile'?'active':''}`} onClick={()=>setTab('profile')}><span className="navicon">👤</span>Profile</button>
      </div>

      {showFilters && <FiltersModal current={filters} onApply={(f)=>{ setFilters(f); setShowFilters(false); showToast("Filters applied"); }} onClose={()=>setShowFilters(false)} />}
      {rateTarget && <RateModal user={rateTarget} onClose={()=>setRateTarget(null)} onSubmit={()=>{ setRateTarget(null); showToast("Rating submitted"); }} />}
      {toast && <Toast text={toast} onDone={()=>setToast(null)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
